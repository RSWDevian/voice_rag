# docker-compose.yml
version: '3.8'

services:
  streaming-rag:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: streaming-rag-app
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - STT_MODEL=${STT_MODEL:-openai/whisper-large-v3-turbo}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-4o-mini:nitro}
      - TTS_MODEL=${TTS_MODEL:-eleven_turbo_v2}
      - TTS_VOICE=${TTS_VOICE:-21m00Tcm4TlvDq8ikWAM}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount folders (Docker creates them if they don't exist)
      - ./models:/app/models
      - ./data:/app/data          # ← Docker will create this folder
      - ./logs:/app/logs          # ← Docker will create this folder
      - ./data/embeddings:/app/data/embeddings
      # Live-reload: bind-mount source so edits show up without a rebuild.
      # static/ is served straight off disk (no restart needed); src/ changes
      # are picked up by uvicorn --reload (see docker/Dockerfile CMD).
      - ./src:/app/src
      - ./static:/app/static
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: streaming-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  redis-data: